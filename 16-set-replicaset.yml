apiVersion: v1
kind: ReplicaSet
metadata:
  name: nginx
  # this labels is for replicaset
  labels:
    project: roboshop
    environment: dev
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      # these labels is for replicaset to select the pods
      project: roboshop
      environment: dev
      component: frontend
  template:
    metadata:
    # these for pod defination
      labels:
        project: roboshop
        environment: dev
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx

